name: Update Language Statistics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    environment:
      name: test
    steps:
      - uses: actions/checkout@v4
      - uses: stefvuck/Github-Language-Stats@v1.1.0
        with:
          github_token: ${{ secrets.LANGUAGE_STATS_TOKEN }}
          visualization_types: "leaderboard"
          exclude_languages: "Jupyter Notebook,Ruby,Dart,Go,Fortran,Rust,Kotlin,Perl,R,Julia,MATLAB,Visual Basic .NET,PHP,Java,C#"
          top_repos_count: '5'
          dark_mode: "true"
          output_path: "stats"
